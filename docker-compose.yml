version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: clientfinder-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clientfinder
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: clientfinder-backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/clientfinder?schema=public
      - JWT_SECRET=ai-video-editing-client-finder-super-secret-key-2026
      - JWT_EXPIRES_IN=7d
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: clientfinder-frontend
    restart: always
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  postgres_data:
